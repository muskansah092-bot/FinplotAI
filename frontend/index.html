<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finplot AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- ===== Header ===== -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">F</span>
        <span class="brand-name">Finplot <em>AI</em></span>
      </div>
      <button class="new-chat-btn" id="newChatBtn" title="Start a new conversation">
        New entry
      </button>
    </header>

    <!-- ===== Chat log ===== -->
    <main class="chat-log" id="chatLog">

      <div class="empty-state" id="emptyState">
        <div class="ledger-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" width="40" height="40">
            <line x1="10" y1="16" x2="54" y2="16" stroke="currentColor" stroke-width="2"/>
            <line x1="10" y1="28" x2="54" y2="28" stroke="currentColor" stroke-width="2"/>
            <line x1="10" y1="40" x2="40" y2="40" stroke="currentColor" stroke-width="2"/>
            <circle cx="48" cy="40" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
          </svg>
        </div>
        <h1>Ask Finplot AI</h1>
        <p>Upload a passbook or statement, log a transaction manually, or just ask a question &mdash; about your spending, a savings goal, or where to invest next.</p>

        <div class="suggestion-row">
          <button class="suggestion" data-prompt="Give me a quick summary of my spending this month.">Summarize my spending</button>
          <button class="suggestion" data-prompt="Help me plan a savings goal.">Plan a savings goal</button>
          <button class="suggestion" data-prompt="What should I know before investing this month?">Investment advice</button>
        </div>
      </div>

      <!-- messages get appended here at runtime -->
    </main>

    <!-- ===== Composer ===== -->
    <footer class="composer-wrap">
      <div class="attachment-chip-row" id="attachmentRow"></div>

      <form class="composer" id="composerForm">

        <div class="attach-anchor">
          <button type="button" class="icon-btn plus-btn" id="plusBtn" aria-haspopup="true" aria-expanded="false" title="Add a statement or entry">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>

          <div class="attach-menu" id="attachMenu" role="menu">
            <button type="button" role="menuitem" id="uploadFileOption">
              <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 3v12m0-12 4 4m-4-4-4 4M5 17v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Upload statement <span>PDF or CSV</span>
            </button>
            <button type="button" role="menuitem" id="manualEntryOption">
              <svg viewBox="0 0 24 24" width="16" height="16"><path d="M4 20h4l10.5-10.5a2.1 2.1 0 0 0-3-3L5 17v3Z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/></svg>
              Enter transaction manually <span>Add one line by hand</span>
            </button>
          </div>
        </div>

        <input type="file" id="fileInput" accept=".pdf,.csv" hidden />

        <textarea
          id="messageInput"
          class="composer-input"
          placeholder="Message Finplot AI…"
          rows="1"
          autocomplete="off"
        ></textarea>

        <button type="submit" class="icon-btn send-btn" id="sendBtn" title="Send">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 12h16m0 0-6-6m6 6-6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </form>

      <p class="composer-footnote">Finplot AI can make mistakes. Verify important financial decisions.</p>
    </footer>

  </div>

  <!-- ===== Manual transaction entry modal ===== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">Add a transaction</h2>
        <button class="icon-btn" id="modalCloseBtn" title="Close">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <form id="manualEntryForm" class="ledger-form">
        <div class="field">
          <label for="txDate">Date</label>
          <input type="date" id="txDate" required>
        </div>
        <div class="field">
          <label for="txMerchant">Merchant</label>
          <input type="text" id="txMerchant" placeholder="e.g. Big Bazaar" required>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="txAmount">Amount</label>
            <input type="number" id="txAmount" step="0.01" placeholder="0.00" required>
          </div>
          <div class="field">
            <label for="txType">Type</label>
            <select id="txType">
              <option value="debit">Debit</option>
              <option value="credit">Credit</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="txCategory">Category</label>
          <select id="txCategory">
            <option value="shopping">Shopping</option>
            <option value="food">Food</option>
            <option value="subscription">Subscription</option>
            <option value="emi">EMI</option>
            <option value="bnpl">BNPL</option>
            <option value="other">Other</option>
          </select>
        </div>

        <button type="submit" class="primary-btn">Add to conversation</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
